type: http
name: Create a new refund
url: '{{baseUrl}}/refunds'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "transactionId": "txn_1234567890abcdef",
      "amount": null,
      "reason": "Customer requested refund",
      "notifyCustomer": true,
      "metadata": {
        "initiatedBy": "admin@example.com",
        "ticketNumber": "TKT-12345"
      }
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "refundId": "rfnd_abc123def456",
            "transactionId": "txn_1234567890abcdef",
            "status": "pending",
            "amount": 5000,
            "currency": "USD",
            "refundAmount": 5000,
            "refundCurrency": "USD",
            "reason": "Customer requested refund",
            "createdAt": "2024-01-15T10:30:00Z",
            "updatedAt": "2024-01-15T10:30:00Z",
            "estimatedCompletionTime": "2024-01-15T14:30:00Z",
            "metadata": {
              "initiatedBy": "admin@example.com",
              "ticketNumber": "TKT-12345"
            },
            "links": {
              "self": "/refunds/rfnd_abc123def456",
              "status": "/refunds/rfnd_abc123def456/status",
              "cancel": "/refunds/rfnd_abc123def456/cancel"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
        - key: Location
          value: /refunds/rfnd_abc123def456
          description: URI of the created refund resource
          disabled: false
    name: Refund created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "INVALID_REFUND_AMOUNT",
            "message": "Refund amount exceeds the original transaction amount",
            "details": {
              "transactionId": "txn_1234567890abcdef",
              "originalAmount": 5000,
              "requestedRefundAmount": 6000,
              "currency": "USD"
            },
            "code": "VALIDATION_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Bad request - Invalid input or business rule violation
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "error": "UNAUTHORIZED",
            "message": "Authentication token is required",
            "details": {
              "requiredAuth": "Bearer token (OAuth 2.0 or JWT)"
            },
            "code": "AUTHENTICATION_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized - Invalid or missing authentication token
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "TRANSACTION_NOT_FOUND",
            "message": "The specified transaction was not found",
            "details": {
              "transactionId": "txn_invalid123",
              "suggestion": "Verify the transaction ID and try again"
            },
            "code": "RESOURCE_NOT_FOUND",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transaction not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "DUPLICATE_REFUND",
            "message": "A refund with the same parameters already exists for this transaction",
            "details": {
              "transactionId": "txn_1234567890abcdef",
              "existingRefundId": "rfnd_existing123",
              "conflictType": "duplicate_request"
            },
            "code": "CONFLICT",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Conflict - Refund already exists or transaction state conflict
  - response:
      statusCode: 422
      statusText: Unprocessable Entity (WebDAV) (RFC 4918)
      body:
        type: json
        content: |-
          {
            "error": "TRANSACTION_TOO_OLD",
            "message": "Refunds cannot be issued more than 180 days after the original transaction",
            "details": {
              "transactionId": "txn_1234567890abcdef",
              "transactionDate": "2023-06-01T00:00:00Z",
              "daysSinceTransaction": 195,
              "maxDaysAllowed": 180
            },
            "code": "BUSINESS_RULE_VIOLATION",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unprocessable entity - Business validation failed
  - response:
      statusCode: 429
      statusText: Too Many Requests
      body:
        type: json
        content: |-
          {
            "error": "RATE_LIMIT_EXCEEDED",
            "message": "Rate limit exceeded. Please retry after the specified time",
            "details": {
              "limit": 100,
              "window": "1 minute",
              "retryAfter": 45
            },
            "code": "RATE_LIMIT_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Too many requests - Rate limit exceeded
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "INTERNAL_SERVER_ERROR",
            "message": "An unexpected error occurred while processing the refund",
            "details": {
              "requestId": "req_abc123def456",
              "suggestion": "Please retry the request. If the issue persists, contact support."
            },
            "code": "SERVER_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
  - response:
      statusCode: 503
      statusText: Service Unavailable
      body:
        type: json
        content: |-
          {
            "error": "MAINTENANCE_MODE",
            "message": "The service is currently under maintenance",
            "details": {
              "maintenanceWindow": "2024-01-15T02:00:00Z - 2024-01-15T04:00:00Z",
              "estimatedCompletion": "2024-01-15T04:00:00Z"
            },
            "code": "SERVICE_UNAVAILABLE",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service unavailable - Maintenance or overload
