type: http
name: Get refund details
url: '{{baseUrl}}/refunds/:refundId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: refundId
    value: rfnd_abc123def456
    description: Unique identifier for the refund
scripts:
  - type: afterResponse
    code:
      - // [Contract] Auto-generated contract test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
      - pm.test('Content-Type is application/json', function () {
      - '    if (pm.response.code !== 204) {'
      - '        pm.response.to.have.header(''Content-Type'');'
      - '        pm.expect(pm.response.headers.get(''Content-Type'')).to.include(''application/json'');'
      - '    }'
      - '});'
      - pm.test('Response is valid JSON', function () {
      - '    if (pm.response.code !== 204) {'
      - '        pm.response.to.be.json;'
      - '    }'
      - '});'
      - // Validate required fields from response schema
      - pm.test('Required fields are present', function () {
      - '    if (pm.response.code === 204) return;'
      - '    var jsonData = pm.response.json();'
      - '    pm.expect(jsonData).to.be.an(''object'');'
      - '    var keys = Object.keys(jsonData);'
      - '    if (keys.length === 1 && Array.isArray(jsonData[keys[0]])) {'
      - '        pm.expect(jsonData[keys[0]]).to.be.an(''array'');'
      - '    }'
      - '});'
      - // Validate response field types (non-null required fields)
      - pm.test('Field types are correct', function () {
      - '    if (pm.response.code === 204) return;'
      - '    var jsonData = pm.response.json();'
      - '    Object.keys(jsonData).forEach(function(key) {'
      - '        pm.expect(jsonData[key]).to.not.be.undefined;'
      - '    });'
      - '});'
      - (function() {
      - '    var status = pm.response.code;'
      - '    if (status === 204) return; '
      - '    try {'
      - '        var body = pm.response.json();'
      - '        pm.test(''Response body matches expected structure'', function () {'
      - '            pm.expect(typeof body).to.equal(''object'');'
      - '            if (status >= 400) {'
      - '                pm.expect(body).to.have.property(''error'');'
      - '                pm.expect(body).to.have.property(''message'');'
      - '            }'
      - '        });'
      - '    } catch (e) {}'
      - '})();'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "refundId": "rfnd_abc123def456",
            "transactionId": "txn_1234567890abcdef",
            "status": "completed",
            "amount": 5000,
            "currency": "USD",
            "refundAmount": 5000,
            "refundCurrency": "USD",
            "reason": "Customer requested refund",
            "createdAt": "2024-01-15T10:30:00Z",
            "updatedAt": "2024-01-15T14:25:00Z",
            "completedAt": "2024-01-15T14:25:00Z",
            "processingTime": 14520,
            "statusHistory": [
              {
                "status": "pending",
                "timestamp": "2024-01-15T10:30:00Z",
                "message": "Refund request created"
              },
              {
                "status": "processing",
                "timestamp": "2024-01-15T12:00:00Z",
                "message": "Refund processing initiated"
              },
              {
                "status": "completed",
                "timestamp": "2024-01-15T14:25:00Z",
                "message": "Refund processed successfully"
              }
            ],
            "metadata": {
              "initiatedBy": "admin@example.com",
              "ticketNumber": "TKT-12345",
              "paymentGatewayRefundId": "pg_rfnd_789xyz"
            },
            "links": {
              "self": "/refunds/rfnd_abc123def456",
              "transaction": "/transactions/txn_1234567890abcdef"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Refund details retrieved successfully
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "error": "UNAUTHORIZED",
            "message": "Authentication token is required",
            "code": "AUTHENTICATION_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized - Invalid or missing authentication
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "REFUND_NOT_FOUND",
            "message": "The specified refund was not found",
            "details": {
              "refundId": "rfnd_invalid123",
              "suggestion": "Verify the refund ID and try again"
            },
            "code": "RESOURCE_NOT_FOUND",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Refund not found
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "error": "INTERNAL_SERVER_ERROR",
            "message": "An unexpected error occurred",
            "details": {
              "requestId": "req_abc123def456"
            },
            "code": "SERVER_ERROR",
            "timestamp": "2024-01-15T10:30:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
